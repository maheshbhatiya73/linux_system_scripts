# =============================================================================
# backup.conf — sourced by remote_backup.sh (bash syntax only)
# Copy to /etc/system_scripts/backup.conf or pass: remote_backup.sh -c /path/to/backup.conf
# =============================================================================

# Human-readable label used in archive names and logs
BACKUP_NAME="$(hostname -s)"

# Where temporary archives are built before transfer (needs free space)
LOCAL_STAGING_DIR="/var/backups/system_scripts_staging"

# Log file (script will create parent dirs if possible)
LOG_FILE="/var/log/system_backup.log"

# archive  — tar (optional compress) each logical backup set, then transfer
# rsync    — mirror BACKUP_SOURCES directly to REMOTE_PATH (no single tarball)
BACKUP_MODE="archive"

# --- Sources (add as many absolute paths as you need) ------------------------
BACKUP_SOURCES=(
    #"/etc"
    # "/home"
     "/var/www"
)

# --- Excludes (applied to tar and rsync; rsync glob rules) -------------------
BACKUP_EXCLUDES=(
    "*.tmp"
    "*.swp"
    "*~"
    ".cache"
    "node_modules"
    "__pycache__"
)

# Compression for archive mode: gzip | xz | zstd | none
ARCHIVE_COMPRESS="gzip"

# Optional prefix for remote filename: ${PREFIX}-${NAME}-timestamp.tar...
ARCHIVE_FILENAME_PREFIX=""

# --- Remote transfer ---------------------------------------------------------
REMOTE_ENABLED="no"
REMOTE_HOST="backup.example.com"
REMOTE_USER="root"
REMOTE_PORT="22"
REMOTE_PATH="/backups/$(hostname -s)"
# Leave empty to use ssh default (~/.ssh/config)
SSH_IDENTITY_FILE=""
# Extra rsync options (space-separated, quoted as one string)
RSYNC_EXTRA_OPTS="--partial --inplace"

# Verify: after upload, compare local sha256 with remote (archive mode only)
VERIFY_CHECKSUM="yes"

# --- Retention (0 = disabled for that side) ---------------------------------
# Delete local staging archives older than N days
RETENTION_DAYS_LOCAL="7"
# SSH in and find/delete remote archives matching our naming pattern
RETENTION_DAYS_REMOTE="30"

# --- Optional hooks (executable scripts) -------------------------------------
PRE_BACKUP_HOOK=""
POST_BACKUP_HOOK=""

# --- Optional MySQL dump (archive mode: included inside the tarball) ---------
MYSQL_DUMP_ENABLED="no"
MYSQL_DUMP_USER=""
# Prefer socket auth on localhost; set password file: echo 'pass' > /root/.mysql-backup.cnf (chmod 600)
MYSQL_DEFAULTS_EXTRA_FILE=""
MYSQL_DATABASES=""   # space-separated list, empty = --all-databases

# --- Optional PostgreSQL dump -------------------------------------------------
POSTGRES_DUMP_ENABLED="no"
POSTGRES_USER="postgres"
POSTGRES_DATABASES=""   # space-separated, empty = all databases (pg_dumpall)

# Staging subdirectory for DB dumps inside the archive
DB_DUMP_SUBDIR="_db_dumps"
