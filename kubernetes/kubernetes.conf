# Kubernetes Configuration File
# This file contains default configuration for the Kubernetes installer

# Kubernetes version to install (e.g., 1.29, 1.28, 1.27)
KUBE_VERSION=1.29

# Docker version (latest or specific version like 24.0)
DOCKER_VERSION=latest

# Cluster name
CLUSTER_NAME=kubernetes-cluster

# Pod Network CIDR (used by CNI plugin)
POD_CIDR=10.244.0.0/16

# Service CIDR
SERVICE_CIDR=10.96.0.0/12

# Control plane endpoint (for HA setups)
# Example: CP_ENDPOINT=kubernetes.example.com:6443
CP_ENDPOINT=

# Enable metrics server installation (optional)
INSTALL_METRICS_SERVER=true

# Enable dashboard installation (optional)
INSTALL_DASHBOARD=true
